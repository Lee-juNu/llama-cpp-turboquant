services:
  gemma-server:
    build:
      context: .
      dockerfile: .devops/cuda.Dockerfile
      target: server
    image: local/llama.cpp:server-cuda-turboquant
    container_name: gemma-server
    restart: unless-stopped
    gpus: all
    ports:
      - "8081:8080"
    volumes:
      - ./models:/models
      - ./media:/media:ro
    command:
      - -m
      - ${GEMMA_MODEL:-/models/gemma-4-31B-it-UD-Q4_K_XL.gguf}
      - --mmproj
      - ${GEMMA_MMPROJ:-/models/mmproj-gemma-4-31B-it-F16.gguf}
      - -c
      - ${GEMMA_CTX:-65536}
      - -ngl
      - "99"
      - --no-mmap
      - -fa
      - "on"
      - -ctk
      - turbo3
      - -ctv
      - turbo3
      - -b
      - "2048"
      - -ub
      - "512"
      - --media-path
      - ${GEMMA_MEDIA_PATH:-/media}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
